<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probabilistic Context-Free Grammar Tree Visualizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ebebea;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.2);
    --radius: 8px;
    --radius-lg: 12px;
    --font: system-ui, -apple-system, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #27271f;
      --bg3: #2f2f2a;
      --text: #e8e6dc;
      --text2: #b0ae9f;
      --text3: #737068;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 500;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    font-size: 0.8rem;
    color: var(--text3);
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    color: var(--text2);
    margin-bottom: 0.35rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  textarea {
    width: 100%;
    min-height: 160px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    background: var(--bg2);
    color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--border2); }

  input[type="text"] {
    width: 100%;
    font-family: var(--font);
    font-size: 14px;
    background: var(--bg2);
    color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 0.75rem;
    height: 38px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--border2); }

  .row { display: flex; gap: 8px; margin-top: 0.75rem; }
  .row input { flex: 1; }

  button {
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    padding: 0 1rem;
    height: 38px;
    transition: background 0.12s, transform 0.08s;
    white-space: nowrap;
  }
  button:hover { background: var(--bg2); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--text);
    color: var(--bg);
    border-color: transparent;
  }
  button.primary:hover { opacity: 0.88; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.6rem; }
  .chip {
    font-size: 11px;
    padding: 3px 10px;
    height: auto;
    color: var(--text2);
    border-color: var(--border);
  }
  .chip:hover { color: var(--text); }

  .nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
  }
  .nav-row span {
    font-size: 12px;
    color: var(--text2);
    min-width: 100px;
    text-align: center;
  }
  .nav-row button { height: 30px; font-size: 12px; padding: 0 12px; }

  #status {
    font-size: 12px;
    color: var(--text2);
    min-height: 18px;
    margin-top: 0.5rem;
    font-family: var(--mono);
  }
  #status.error { color: #c0392b; }

  #tree-area {
    overflow-x: auto;
    padding: 0.5rem 0;
  }

  .grammar-presets { display: flex; gap: 6px; margin-top: 0.6rem; flex-wrap: wrap; }

  footer {
    margin-top: 2rem;
    font-size: 11px;
    color: var(--text3);
    text-align: center;
  }
  footer a { color: var(--text3); }
</style>
</head>
<body>

<h1>Probabilistic Context-Free Grammar Tree Visualizer</h1>

<div class="card">
  <label>Grammar Rules</label>
  <textarea id="grammar-area">S -> NP VP [1.0]
NP -> Det N [0.86]
NP -> NP PP [0.14]
VP -> V NP [0.67]
VP -> VP PP [0.33]
PP -> P NP [1.0]
Det -> 'the' [1.0]
N -> 'cats' [0.25]
N -> 'dogs' [0.25]
N -> 'garden' [0.25]
N -> 'barn' [0.25]
V -> 'chased' [1.0]
P -> 'in' [0.5]
P -> 'behind' [0.5]</textarea>
  <div class="grammar-presets">
    <span style="font-size:11px;color:var(--text3);align-self:center">Presets:</span>
    <button class="chip" onclick="setPreset('simple')">Simple grammar</button>
    <button class="chip" onclick="setPreset('pp')">PP attachment</button>
  </div>
</div>

<div class="card">
  <label>Sentence</label>
  <div class="row">
    <input id="sentence-input" type="text" placeholder="Type a sentence..." value="the cats chased the dogs" />
    <button class="primary" onclick="doParse()">Parse ↗</button>
  </div>
  <div class="chips">
    <span style="font-size:11px;color:var(--text3);align-self:center">Examples:</span>
    <button class="chip" onclick="setSentence('the cats chased the dogs')">the cats chased the dogs</button>
    <button class="chip" onclick="setSentence('the dogs chased the cats in the garden')">…in the garden</button>
    <button class="chip" onclick="setSentence('the dogs chased the cats in the garden behind the barn')">…behind the barn</button>
    <button class="chip" onclick="setSentence('the dogs chased the cats in the garden behind the barn in the garden')">…behind the barn in the garden</button>
  </div>
  <div id="status"></div>
</div>

<div class="card" id="output-card" style="display:none">
  <div class="nav-row" id="nav-row" style="display:none">
    <button onclick="prevTree()">← Prev</button>
    <span id="tree-counter"></span>
    <button onclick="nextTree()">Next →</button>
  </div>
  <div id="tree-area"></div>
</div>

<footer>
  Built with a CKY parser · Grammar formalism from UC Davis LIN 177 ·
  <a href="https://github.com/ucdaviscl/lin177cfg" target="_blank">lin177cfg</a>
</footer>

<script>
const PRESETS = {
  simple: {
    grammar: `S -> NP VP [1.00]
NP -> Pronoun [0.67]
NP -> Det N [0.33]
VP -> V [0.50]
VP -> V NP [0.50]
Pronoun -> 'they' [0.50]
Pronoun -> 'it' [0.50]
Det -> 'the' [1.00]
N -> 'dog' [1.00]
V -> 'like' [0.50]
V -> 'runs' [0.50]`,
    sentence: 'it runs'
  },
  pp: {
    grammar: `S -> NP VP [1.0]
NP -> Det N [0.86]
NP -> NP PP [0.14]
VP -> V NP [0.67]
VP -> VP PP [0.33]
PP -> P NP [1.0]
Det -> 'the' [1.0]
N -> 'cats' [0.25]
N -> 'dogs' [0.25]
N -> 'garden' [0.25]
N -> 'barn' [0.25]
V -> 'chased' [1.0]
P -> 'in' [0.5]
P -> 'behind' [0.5]`,
    sentence: 'the dogs chased the cats in the garden behind the barn'
  }
};

function setPreset(k) {
  document.getElementById('grammar-area').value = PRESETS[k].grammar;
  document.getElementById('sentence-input').value = PRESETS[k].sentence;
  clearOutput();
}
function setSentence(s) {
  document.getElementById('sentence-input').value = s;
  doParse();
}
function clearOutput() {
  document.getElementById('output-card').style.display = 'none';
  document.getElementById('tree-area').innerHTML = '';
  document.getElementById('status').textContent = '';
  document.getElementById('status').className = '';
}

// --- Grammar parser ---
function parseGrammar(text) {
  const rules = {};
  const lexicon = {};
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#') || !trimmed.includes('->')) continue;
    const arrowIdx = trimmed.indexOf('->');
    const lhs = trimmed.slice(0, arrowIdx).trim();
    const rest = trimmed.slice(arrowIdx + 2).trim();
    const probMatch = rest.match(/\[([0-9.]+)\]\s*$/);
    const prob = probMatch ? parseFloat(probMatch[1]) : 1.0;
    const rhs = rest.replace(/\[[0-9.]+\]\s*$/, '').trim();
    const terms = rhs.split(/\s+/).filter(Boolean);
    if (terms.length === 1 && terms[0].startsWith("'")) {
      const word = terms[0].replace(/'/g, '').toLowerCase();
      if (!lexicon[word]) lexicon[word] = [];
      lexicon[word].push({ tag: lhs, prob });
    } else if (terms.length > 0) {
      if (!rules[lhs]) rules[lhs] = [];
      rules[lhs].push({ rhs: terms, prob });
    }
  }
  return { rules, lexicon };
}

// --- CKY parser returning ALL parses (up to MAX_TREES) ---
const MAX_TREES = 20;

function ckyParseAll(grammar, words) {
  const n = words.length;
  // table[i][j][sym] = array of { prob, back }
  const table = Array.from({length: n}, () =>
    Array.from({length: n}, () => ({}))
  );

  function addEntry(i, j, sym, prob, back) {
    if (!table[i][j][sym]) table[i][j][sym] = [];
    // Avoid exact duplicates
    table[i][j][sym].push({ prob, back });
  }

  // Lexical + unary on diagonal
  for (let i = 0; i < n; i++) {
    const w = words[i];
    const tags = grammar.lexicon[w] || [];
    for (const {tag, prob} of tags) {
      addEntry(i, i, tag, prob, { word: w });
    }
    // Unary rules over single words
    let added = true;
    const visited = new Set();
    while (added) {
      added = false;
      for (const [lhs, rhsList] of Object.entries(grammar.rules)) {
        for (const {rhs, prob} of rhsList) {
          if (rhs.length === 1 && table[i][i][rhs[0]]) {
            for (const childEntry of table[i][i][rhs[0]]) {
              const newProb = prob * childEntry.prob;
              const key = `${lhs}:${rhs[0]}:${newProb.toFixed(10)}`;
              if (!visited.has(key)) {
                visited.add(key);
                addEntry(i, i, lhs, newProb, { unary: rhs[0], left: i, right: i });
                added = true;
              }
            }
          }
        }
      }
    }
  }

  // Fill upper triangle
  for (let span = 2; span <= n; span++) {
    for (let i = 0; i <= n - span; i++) {
      const j = i + span - 1;
      for (let k = i; k < j; k++) {
        for (const [lhs, rhsList] of Object.entries(grammar.rules)) {
          for (const {rhs, prob} of rhsList) {
            if (rhs.length === 2) {
              const [B, C] = rhs;
              if (table[i][k][B] && table[k+1][j][C]) {
                for (const le of table[i][k][B]) {
                  for (const re of table[k+1][j][C]) {
                    addEntry(i, j, lhs, prob * le.prob * re.prob, { split: k, left: B, right: C, li: 0, ri: 0 });
                  }
                }
              }
            }
          }
        }
      }
      // Unary over spans
      let added = true;
      const visited = new Set();
      while (added) {
        added = false;
        for (const [lhs, rhsList] of Object.entries(grammar.rules)) {
          for (const {rhs, prob} of rhsList) {
            if (rhs.length === 1 && table[i][j][rhs[0]]) {
              for (const ce of table[i][j][rhs[0]]) {
                const newProb = prob * ce.prob;
                const key = `${lhs}:${rhs[0]}:${newProb.toFixed(10)}`;
                if (!visited.has(key)) {
                  visited.add(key);
                  addEntry(i, j, lhs, newProb, { unary: rhs[0], left: i, right: j });
                  added = true;
                }
              }
            }
          }
        }
      }
    }
  }
  return table;
}

// Build all trees from packed chart
function buildTrees(table, sym, i, j, limit) {
  if (!table[i][j][sym]) return [];
  const results = [];
  for (const entry of table[i][j][sym]) {
    if (results.length >= limit) break;
    const b = entry.back;
    if (b.word !== undefined) {
      results.push({ label: sym, prob: entry.prob, children: [{ label: b.word, children: [], isLeaf: true }] });
    } else if (b.unary !== undefined) {
      const childTrees = buildTrees(table, b.unary, b.left, b.right, limit);
      for (const ct of childTrees) {
        if (results.length >= limit) break;
        results.push({ label: sym, prob: entry.prob, children: [ct] });
      }
    } else if (b.split !== undefined) {
      const leftTrees = buildTrees(table, b.left, i, b.split, limit);
      const rightTrees = buildTrees(table, b.right, b.split+1, j, limit);
      for (const lt of leftTrees) {
        for (const rt of rightTrees) {
          if (results.length >= limit) break;
          results.push({ label: sym, prob: entry.prob, children: [lt, rt] });
        }
      }
    }
  }
  return results;
}

// --- Layout ---
const NODE_W = 68, NODE_H = 28, H_GAP = 8, V_GAP = 50;

function layoutTree(node) {
  if (!node.children.length) { node.width = NODE_W; return; }
  node.children.forEach(layoutTree);
  const totalW = node.children.reduce((s, c) => s + c.width, 0) + H_GAP * (node.children.length - 1);
  node.width = Math.max(NODE_W, totalW);
  let cx = 0;
  node.children.forEach(c => {
    c.xOffset = cx + c.width/2 - totalW/2;
    cx += c.width + H_GAP;
  });
}

function assignPos(node, x, y) {
  node.x = x; node.y = y;
  node.children.forEach(c => assignPos(c, x + c.xOffset, y + V_GAP + NODE_H));
}

const NODE_COLORS = {
  S:       { fill: '#EEEDFE', stroke: '#534AB7', text: '#534AB7' },
  NP:      { fill: '#E1F5EE', stroke: '#0F6E56', text: '#0F6E56' },
  VP:      { fill: '#FAEEDA', stroke: '#854F0B', text: '#854F0B' },
  PP:      { fill: '#FAECE7', stroke: '#993C1D', text: '#993C1D' },
  Det:     { fill: '#E6F1FB', stroke: '#185FA5', text: '#185FA5' },
  N:       { fill: '#EAF3DE', stroke: '#3B6D11', text: '#3B6D11' },
  V:       { fill: '#EAF3DE', stroke: '#3B6D11', text: '#3B6D11' },
  P:       { fill: '#EAF3DE', stroke: '#3B6D11', text: '#3B6D11' },
  Pronoun: { fill: '#E6F1FB', stroke: '#185FA5', text: '#185FA5' },
};
const DEFAULT_COLOR = { fill: '#F1EFE8', stroke: '#5F5E5A', text: '#5F5E5A' };

function renderTree(root, treeIndex, totalTrees) {
  layoutTree(root);
  assignPos(root, root.width / 2, 30);

  let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
  function bounds(n) {
    minX = Math.min(minX, n.x - NODE_W/2);
    maxX = Math.max(maxX, n.x + NODE_W/2);
    maxY = Math.max(maxY, n.y + NODE_H);
    n.children.forEach(bounds);
  }
  bounds(root);

  const PAD = 28;
  const W = Math.max(maxX - minX + PAD*2, 300);
  const H = maxY + PAD + 28;
  const ox = PAD - minX;

  let linesSVG = '', nodesSVG = '';

  function draw(n) {
    const cx = n.x + ox;
    n.children.forEach(c => {
      const cCx = c.x + ox;
      linesSVG += `<line x1="${cx.toFixed(1)}" y1="${(n.y + NODE_H).toFixed(1)}" x2="${cCx.toFixed(1)}" y2="${c.y.toFixed(1)}" stroke="#73726c" stroke-width="1.2"/>`;
      draw(c);
    });
    if (n.isLeaf) {
      nodesSVG += `<text x="${cx.toFixed(1)}" y="${(n.y + NODE_H/2 + 1).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#1a1a18" font-family="system-ui,sans-serif">${escHtml(n.label)}</text>`;
    } else {
      const c = NODE_COLORS[n.label] || DEFAULT_COLOR;
      nodesSVG += `<rect x="${(cx - NODE_W/2).toFixed(1)}" y="${n.y.toFixed(1)}" width="${NODE_W}" height="${NODE_H}" rx="6" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1"/>`;
      nodesSVG += `<text x="${cx.toFixed(1)}" y="${(n.y + NODE_H/2 + 1).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="${c.text}" font-family="system-ui,sans-serif">${escHtml(n.label)}</text>`;
    }
  }
  draw(root);

  const prob = root.prob;
  const probStr = prob === undefined ? '' : (prob < 0.001 ? prob.toExponential(3) : prob.toFixed(6));
  const caption = `Tree ${treeIndex + 1} of ${totalTrees}  ·  p = ${probStr}`;

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;max-width:100%;overflow:visible">
    ${linesSVG}${nodesSVG}
    <text x="${W/2}" y="${H - 6}" text-anchor="middle" font-size="11" fill="#9c9a92" font-family="ui-monospace,monospace">${caption}</text>
  </svg>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --- State ---
let allTrees = [];
let currentTreeIdx = 0;

function showTree(idx) {
  currentTreeIdx = idx;
  const treeArea = document.getElementById('tree-area');
  const counter = document.getElementById('tree-counter');
  if (allTrees.length === 0) return;
  treeArea.innerHTML = renderTree(allTrees[idx], idx, allTrees.length);
  counter.textContent = `Tree ${idx + 1} / ${allTrees.length}`;
}

function prevTree() { if (currentTreeIdx > 0) showTree(currentTreeIdx - 1); }
function nextTree() { if (currentTreeIdx < allTrees.length - 1) showTree(currentTreeIdx + 1); }

function doParse() {
  const grammarText = document.getElementById('grammar-area').value;
  const sentence = document.getElementById('sentence-input').value.trim().toLowerCase();
  const statusEl = document.getElementById('status');
  const outputCard = document.getElementById('output-card');
  const navRow = document.getElementById('nav-row');

  statusEl.className = '';
  if (!sentence) { statusEl.textContent = 'Enter a sentence to parse.'; outputCard.style.display = 'none'; return; }

  let grammar;
  try { grammar = parseGrammar(grammarText); }
  catch(e) { statusEl.textContent = 'Grammar error: ' + e.message; statusEl.className = 'error'; return; }

  const words = sentence.split(/\s+/);
  const unknown = words.filter(w => !grammar.lexicon[w]);
  if (unknown.length) {
    statusEl.textContent = `Unknown word(s): ${unknown.join(', ')} — add lexical rules to grammar.`;
    statusEl.className = 'error';
    outputCard.style.display = 'none';
    return;
  }

  let table;
  try { table = ckyParseAll(grammar, words); }
  catch(e) { statusEl.textContent = 'Parse error: ' + e.message; statusEl.className = 'error'; return; }

  const n = words.length;
  if (!table[0][n-1]['S'] || table[0][n-1]['S'].length === 0) {
    statusEl.textContent = 'No parse found for this sentence with the current grammar.';
    statusEl.className = 'error';
    outputCard.style.display = 'none';
    return;
  }

  allTrees = buildTrees(table, 'S', 0, n-1, MAX_TREES);
  // Sort by probability descending
  allTrees.sort((a, b) => b.prob - a.prob);

  const foundCount = allTrees.length;
  statusEl.textContent = `Found ${foundCount} parse tree${foundCount > 1 ? 's' : ''}${foundCount >= MAX_TREES ? ' (showing top ' + MAX_TREES + ')' : ''}.`;

  outputCard.style.display = '';
  navRow.style.display = foundCount > 1 ? 'flex' : 'none';
  showTree(0);
}

document.getElementById('sentence-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doParse();
});
doParse();
</script>
</body>
</html>
